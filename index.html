const ACCOMMODATION_CATEGORIES = {
  ENV: { label: "Environmental", items: ["Preferential seating","Reduced visual/auditory distractions","Access to quiet space or sensory break area","Permission to use noise-canceling headphones","Flexible seating (standing desk, wobble chair, etc.)","Separate testing location","Modified lighting","Access to elevator or ground-floor classes"] },
  TIME: { label: "Timing & Scheduling", items: ["Extended time on tests (1.5x or 2x)","Extended time on assignments","Flexible deadlines with pre-arranged plan","Breaks during tests (timed or as-needed)","Breaks during class (movement or sensory)","Modified schedule or late arrival","Reduced homework load (quality over quantity)","Chunked assignments with check-ins"] },

const DISABILITY_ACCOMMODATION_MAP = {

  "Anxiety disorder": ["ENV","TIME","SOCIAL","ASSESS"],
  "Depression": ["TIME","SOCIAL","ASSESS","INST"],
  "Autism spectrum (without IEP)": ["ENV","SOCIAL","INST","TIME","ASSESS"],
  "Dyslexia / reading disability": ["INST","ASSESS","TECH","TIME"],
  "Dysgraphia / writing disability": ["TECH","ASSESS","TIME","INST"],
  "Dyscalculia / math disability": ["ASSESS","INST","TECH","TIME"],
  "Chronic health condition (diabetes, asthma, epilepsy, etc.)": ["MED","TIME","ENV"],
  "Physical disability or mobility limitation": ["ENV","TIME","TECH","MED"],
  "Vision impairment": ["TECH","ENV","INST","ASSESS"],
  "Hearing impairment": ["TECH","ENV","INST","ASSESS"],
  "Post-concussion / TBI recovery": ["ENV","TIME","MED","INST","ASSESS"],
  "OCD": ["TIME","SOCIAL","ENV","ASSESS"],

  "Sensory processing differences": ["ENV","SOCIAL","TIME","INST"],

const RED_FLAG_RULES_504 = [
  { id: "no_written_plan", check: d => d.hasWrittenPlan === false, text: "School does not have a written 504 plan. While not technically required everywhere, a written plan is essential for enforcement. Request one immediately.", severity: "High" },
  { id: "no_parent_meeting", check: d => d.parentInvitedToMeeting === false, text: "Parent was not invited to or included in the 504 meeting. While Section 504 doesn't require parent participation the same way IDEA does, best practice and many district policies include parents. Your input matters.", severity: "High" },
  { id: "no_evaluation", check: d => d.evaluationConducted === false, text: "No evaluation was conducted before developing the 504 plan. Section 504 requires schools to evaluate before placement decisions.", severity: "High" },
  { id: "verbal_only", check: d => d.accommodationsVerbalOnly === true, text: "Accommodations were communicated verbally but not documented. Verbal agreements are unenforceable. Insist on written documentation.", severity: "High" },
  { id: "teachers_unaware", check: d => d.teachersAwareOfPlan === false, text: "Not all teachers are aware of or implementing the 504 plan. The school has a legal obligation to inform every teacher who interacts with your child.", severity: "High" },
  { id: "no_review", check: d => d.lastReviewOver12Months === true, text: "504 plan has not been reviewed in over 12 months. While the law says 'periodic' review, best practice is annual. Request a review meeting.", severity: "Moderate" },
  { id: "iep_denied_no_504", check: d => d.iepDeniedNotOffered504 === true, text: "Child was denied an IEP but not considered for a 504 plan. Schools should automatically evaluate for Section 504 when a student is found ineligible for IDEA services.", severity: "High" },
  { id: "discipline_no_mdr", check: d => d.disciplinedWithout504Review === true, text: "Child was disciplined (suspension, expulsion, or pattern of removals) without a manifestation determination. Section 504 requires this review before significant changes in placement.", severity: "High" },
  { id: "accommodations_not_followed", check: d => d.accommodationsNotFollowed === true, text: "Documented accommodations are not being consistently implemented. This is a Section 504 violation. Document specific instances and report to the 504 coordinator.", severity: "High" },
  { id: "informal_only", check: d => d.onlyInformalSupports === true, text: "School is providing only informal supports instead of a formal 504 plan. Informal supports can be removed at any time and have no legal protections.", severity: "Moderate" },
];

const GLOSSARY_504 = [
  { term: "Section 504", def: "A federal civil rights law (Section 504 of the Rehabilitation Act of 1973) that prohibits disability discrimination in programs receiving federal funds, including public schools." },
  { term: "504 Plan", def: "A plan that documents the accommodations and supports a student with a disability needs to access education on equal terms with peers." },
  { term: "FAPE (504)", def: "Free Appropriate Public Education under Section 504 — means providing regular or special education and related aids/services designed to meet the student's individual needs as adequately as non-disabled peers' needs are met." },
  { term: "Major Life Activity", def: "Activities that are central to daily life, including learning, reading, concentrating, thinking, communicating, breathing, eating, sleeping, walking, standing, and major bodily functions." },
  { term: "Substantially Limits", def: "The standard for 504 eligibility. A disability must substantially limit one or more major life activities. After the ADA Amendments Act of 2008, this is interpreted broadly." },
  { term: "Accommodation", def: "A change in how a student accesses learning — such as extra time, preferential seating, or technology — without changing what they are expected to learn." },
  { term: "504 Coordinator", def: "The school or district staff member responsible for overseeing Section 504 compliance, including evaluations, plan development, and grievance procedures." },
  { term: "OCR Complaint", def: "A formal complaint filed with the U.S. Department of Education's Office for Civil Rights when a school violates Section 504 or Title II of the ADA." },
  { term: "Manifestation Determination", def: "A review to determine whether a student's behavior is related to their disability. Required under Section 504 before any significant change in placement, including suspensions over 10 days." },
  { term: "Procedural Safeguards", def: "Rights that protect families during the 504 process, including notice of actions, right to examine records, right to an impartial hearing, and right to file an OCR complaint." },
  { term: "IDEA", def: "Individuals with Disabilities Education Act — the federal special education law that governs IEPs. Different from Section 504 in scope, eligibility, and requirements." },
  { term: "IEP", def: "Individualized Education Program — a more comprehensive plan under IDEA that includes goals, specialized instruction, and related services. If a student qualifies for an IEP, they also qualify for 504 protections." },
  { term: "ADA Title II", def: "Title II of the Americans with Disabilities Act, which works alongside Section 504 to protect students with disabilities in public schools from discrimination." },
];

const MEETING_TYPES_504 = [
  "Initial 504 evaluation meeting", "504 plan development meeting", "Annual 504 review",
  "504 re-evaluation", "504 plan amendment", "Manifestation determination review",
  "Transition meeting (new school or grade)", "Meeting to request a 504 plan",
  "Dispute resolution or grievance meeting",
];

const DISPUTE_CATEGORIES_504 = [
  { id: "denied_eval", label: "School refused to evaluate for a 504 plan", leverage: "Section 504 requires evaluation when there is reason to believe a student has a disability. Request in writing and cite 34 CFR §104.35." },
  { id: "denied_eligibility", label: "School found child ineligible despite documented disability", leverage: "Section 504 uses a broad definition of disability. If your child has a physical or mental impairment that substantially limits a major life activity, they qualify. The ADA Amendments Act of 2008 lowered the bar significantly." },
  { id: "inadequate_accommodations", label: "Accommodations don't match the child's actual needs", leverage: "The 504 plan must be individualized. Generic accommodations not tied to the student's specific disability impact are insufficient." },
  { id: "not_implemented", label: "Teachers are not following the 504 plan", leverage: "Non-implementation is a Section 504 violation. Document specific incidents, report to the 504 coordinator, and escalate to the district if needed." },
  { id: "discipline_violation", label: "Child was disciplined without considering disability", leverage: "Section 504 requires a manifestation determination before significant discipline. If behavior is disability-related, the school must address the underlying need, not just punish." },
  { id: "no_written_plan", label: "School refuses to put the 504 plan in writing", leverage: "While Section 504 doesn't explicitly require a written document, OCR has stated that a written plan is best practice and districts can be found in violation without one." },
  { id: "retaliation", label: "School retaliated after parent advocacy", leverage: "Retaliation against a parent or student for exercising Section 504 rights is itself a violation. Document everything and file an OCR complaint if needed." },
  { id: "transition_failure", label: "504 plan was dropped during school transition", leverage: "The receiving school must implement the existing 504 plan or convene a meeting to develop a new one. The student cannot go without protections during transitions." },
  { id: "iep_to_504_loss", label: "Lost services when moved from IEP to 504", leverage: "If a student was exited from special education, the school should automatically consider Section 504 eligibility. Critical services shouldn't disappear." },
  { id: "access_denied", label: "Child denied access to programs, activities, or field trips", leverage: "Section 504 prohibits exclusion from any school program or activity based on disability. The school must provide accommodations to enable participation." },
];

const TONE_OPTIONS = [
  { id: "collaborative", label: "Collaborative — firm but partnership-focused", desc: "Best for first meetings or good school relationships" },
  { id: "structured", label: "Structured — data-driven and procedural", desc: "Best when you need to establish a paper trail" },
  { id: "assertive", label: "Assertive — rights-forward and direct", desc: "Best when accommodations are being denied or ignored" },
];

function computeModule1(data) {
  const activityScores = {};
  Object.keys(MAJOR_LIFE_ACTIVITIES).forEach(k => activityScores[k] = 0);
  data.disabilities.forEach(dx => {
    const mapped = DISABILITY_ACTIVITY_MAP[dx];
    if (mapped) mapped.forEach(act => activityScores[act] = (activityScores[act] || 0) + 1);
  });
  data.manualActivities.forEach(act => { activityScores[act] = (activityScores[act] || 0) + 2; });
  const rankedActivities = Object.entries(activityScores).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]).map(([code,score]) => ({ code, label: MAJOR_LIFE_ACTIVITIES[code], score }));
  const accCatScores = {};
  data.disabilities.forEach(dx => {
    const cats = DISABILITY_ACCOMMODATION_MAP[dx];
    if (cats) cats.forEach((cat,i) => { accCatScores[cat] = (accCatScores[cat] || 0) + (cats.length - i); });
  });
  const rankedAccCategories = Object.entries(accCatScores).sort((a,b) => b[1]-a[1]).map(([code,score]) => ({ code, label: ACCOMMODATION_CATEGORIES[code].label, score }));
  const redFlags = RED_FLAG_RULES_504.filter(r => r.check(data));
  return { rankedActivities, rankedAccCategories, redFlags };
}

function computeModule2(mod1Data, accData) {
  const gaps = []; const strengths = [];
  const selectedAccs = accData.selectedAccommodations || [];
  mod1Data.rankedAccCategories.slice(0,3).forEach(cat => {
    const catItems = ACCOMMODATION_CATEGORIES[cat.code]?.items || [];
    const hasAny = catItems.some(item => selectedAccs.includes(item));
    if (!hasAny) { gaps.push({ type: "missing_category", text: `No ${cat.label.toLowerCase()} accommodations selected, but your child's disability profile suggests they may be needed.`, severity: "Moderate" }); }
    else { strengths.push(`${cat.label} accommodations are addressed.`); }
  });
  if (accData.hasExistingPlan && !selectedAccs.some(a => a.includes("Extended time"))) {
    const needsTime = mod1Data.rankedActivities.some(a => ["concentrating","thinking","reading"].includes(a.code));
    if (needsTime) { gaps.push({ type: "timing_gap", text: "No extended time accommodations despite concentration/processing impact. This is one of the most commonly needed and effective accommodations.", severity: "High" }); }
  }
  if (!selectedAccs.some(a => a.toLowerCase().includes("break"))) {
    const needsBreaks = mod1Data.rankedActivities.some(a => ["concentrating","socialEmotional","breathing"].includes(a.code));
    if (needsBreaks) { gaps.push({ type: "break_gap", text: "No break accommodations despite emotional/concentration impact. Scheduled or as-needed breaks are critical for regulation.", severity: "Moderate" }); }
  }
  if (accData.teachersNotified === false) { gaps.push({ type: "notification_gap", text: "All teachers who interact with your child must be informed of the 504 plan. Undisclosed plans cannot be implemented.", severity: "High" }); }
  if (accData.implementationTracking === false) { gaps.push({ type: "tracking_gap", text: "No system to track whether accommodations are being consistently implemented. Without tracking, compliance is invisible.", severity: "Moderate" }); }
  const overallRisk = gaps.filter(g => g.severity === "High").length >= 2 ? "High" : gaps.length > 0 ? "Moderate" : "Low";
  return { gaps, strengths, overallRisk };
}

function generateScripts(data, mod1Result, mod2Result, disputes, tone) {
  const childName = data.childName || "my child";
  const scripts = [];
  var opening = "";
  if (tone === "collaborative") {
    opening = `Thank you for meeting with me today about ${childName}'s 504 plan. I appreciate the school's commitment to supporting students with disabilities, and I want to work together to make sure ${childName}'s accommodations are effective and consistently implemented. I've prepared some specific points I'd like to discuss.`;
  } else if (tone === "structured") {
    opening = `Thank you for this meeting regarding ${childName}'s Section 504 plan. I'd like to work through a structured agenda today. I have documentation of ${childName}'s disability impact, specific accommodation needs, and some areas where I believe the current plan needs adjustment. I'll be taking notes for my records.`;
  } else {
    opening = `Thank you for meeting today. I want to be direct: ${childName} has a documented disability that substantially limits major life activities, and Section 504 of the Rehabilitation Act requires this school to provide accommodations that ensure equal access to education. I have specific concerns I need addressed today, and I'll be following up in writing.`;
  }
  scripts.push({ label: "Opening Statement", text: opening });
  disputes.forEach(disputeId => {
    const dispute = DISPUTE_CATEGORIES_504.find(d => d.id === disputeId);
    if (!dispute) return;
    var script = "";
    if (tone === "collaborative") { script = `I'd like to discuss an area where I think we can improve ${childName}'s support. ${dispute.label}. I understand the school has limited resources, but ${dispute.leverage} Can we work together on a solution?`; }
    else if (tone === "structured") { script = `The next item on my agenda: ${dispute.label}. For the record, ${dispute.leverage} I'd like to document what specific steps will be taken and by when.`; }
    else { script = `I need to address a serious concern: ${dispute.label}. Under federal law, ${dispute.leverage} I'm requesting a written response to this concern within 10 business days.`; }
    scripts.push({ label: dispute.label, text: script });
  });
  if (mod2Result && mod2Result.gaps.length > 0) {
    const gapSummary = mod2Result.gaps.slice(0,3).map(g => g.text).join(" Additionally, ");
    var accScript = "";
    if (tone === "collaborative") { accScript = `I've identified some gaps in ${childName}'s current accommodations that I'd like us to address together. ${gapSummary} What options can we explore?`; }
    else if (tone === "structured") { accScript = `Based on my review, the following accommodation gaps need to be addressed: ${gapSummary} I'd like each of these documented with a timeline for implementation.`; }
    else { accScript = `${childName}'s 504 plan has significant gaps that must be addressed: ${gapSummary} Under Section 504, the plan must be individualized to meet ${childName}'s specific needs. I'm requesting these additions be made today.`; }
    scripts.push({ label: "Accommodation Gaps", text: accScript });
  }
  var closing = "";
  if (tone === "collaborative") { closing = `I appreciate your time today and your willingness to work on these adjustments. I'll follow up with an email summarizing what we discussed and the next steps we agreed on. I'd like to schedule a check-in in 30–60 days to see how the changes are working for ${childName}.`; }
  else if (tone === "structured") { closing = `To summarize today's meeting: I'll be sending a follow-up email within 48 hours documenting each decision, responsible party, and timeline. I'm requesting a copy of the updated 504 plan within 10 school days, and I'd like our next review meeting scheduled before the end of this quarter.`; }
  else { closing = `I expect the items discussed today to be reflected in an updated written 504 plan within 10 school days. I will be sending a follow-up email documenting everything discussed, and I reserve all rights under Section 504 and Title II of the ADA, including the right to file a complaint with the Office for Civil Rights if these concerns are not addressed.`; }
  scripts.push({ label: "Closing Statement", text: closing });
  var emailLines = [];
  emailLines.push(`Subject: Follow-Up — ${childName}'s 504 Plan Meeting on [DATE]`);
  emailLines.push(""); emailLines.push("Dear [504 Coordinator / Team],"); emailLines.push("");
  emailLines.push(`Thank you for meeting with me on [DATE] to discuss ${childName}'s Section 504 plan. I want to document the key points from our conversation to ensure we're aligned:`);
  emailLines.push(""); emailLines.push("ITEMS DISCUSSED:");
  disputes.forEach(dId => { const d = DISPUTE_CATEGORIES_504.find(x => x.id === dId); if (d) emailLines.push(`• ${d.label} — [SUMMARIZE WHAT WAS DECIDED]`); });
  if (mod2Result && mod2Result.gaps.length > 0) { emailLines.push("• Accommodation gaps identified — [SUMMARIZE CHANGES AGREED TO]"); }
  emailLines.push(""); emailLines.push("NEXT STEPS:");
  emailLines.push("• Updated written 504 plan to be provided by: [DATE]");
  emailLines.push("• Next review meeting scheduled for: [DATE]");
  emailLines.push("• [ANY OTHER ACTION ITEMS]"); emailLines.push("");
  emailLines.push("Please confirm receipt of this email and let me know if I've captured anything incorrectly."); emailLines.push("");
  emailLines.push(`Thank you for your partnership in supporting ${childName}.`); emailLines.push(""); emailLines.push("[YOUR NAME]"); emailLines.push("[DATE]");
  scripts.push({ label: "Follow-Up Email Template", text: emailLines.join("\n") });
  return scripts;
}

function GlossaryPanel({ open, onClose }) {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", top: 0, right: 0, bottom: 0, width: "min(400px, 90vw)", background: "#fff", zIndex: 1000, boxShadow: "-4px 0 24px rgba(0,0,0,0.15)", overflowY: "auto", fontFamily: FONT_SANS }}>
      <div style={{ padding: "20px 24px", borderBottom: "1px solid " + P.border, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <h3 style={{ margin: 0, fontSize: "16px", fontFamily: FONT, color: P.accent }}>504 Glossary</h3>
        <button onClick={onClose} style={{ background: "none", border: "none", fontSize: "20px", cursor: "pointer", color: P.textMid }}>×</button>
      </div>
      <div style={{ padding: "16px 24px" }}>
        {GLOSSARY_504.map((g,i) => (
          <div key={i} style={{ marginBottom: "16px", paddingBottom: "16px", borderBottom: i < GLOSSARY_504.length-1 ? "1px solid "+P.border : "none" }}>
            <div style={{ fontWeight: 600, fontSize: "13px", color: P.accent, marginBottom: "4px" }}>{g.term}</div>
            <div style={{ fontSize: "13px", color: P.textMid, lineHeight: 1.5 }}>{g.def}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Card({ children, style }) {
  return <div style={Object.assign({ background: P.card, borderRadius: "12px", border: "1px solid "+P.border, padding: "20px", marginBottom: "16px" }, style || {})}>{children}</div>;
}
function Chip({ label, selected, onClick }) {
  return <button onClick={onClick} style={{ display: "inline-block", padding: "8px 14px", borderRadius: "20px", fontSize: "13px", fontFamily: FONT_SANS, border: "1.5px solid "+(selected?P.accent:P.border), background: selected?P.accent:"#fff", color: selected?"#fff":P.text, cursor: "pointer", margin: "0 8px 8px 0" }}>{label}</button>;
}
function SeverityBadge({ level }) {
  const colors = { High: { bg: P.redBg, text: P.red }, Moderate: { bg: P.orangeBg, text: P.orange }, Low: { bg: P.greenBg, text: P.green } };
  const c = colors[level] || colors.Moderate;
  return <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: "12px", fontSize: "11px", fontWeight: 600, fontFamily: FONT_SANS, background: c.bg, color: c.text, textTransform: "uppercase", letterSpacing: "0.05em" }}>{level}</span>;
}
function ProgressBar({ step, total }) {
  return <div style={{ display: "flex", gap: "4px", margin: "0 0 24px" }}>{Array.from({ length: total }, (_,i) => <div key={i} style={{ flex: 1, height: "4px", borderRadius: "2px", background: i <= step ? P.accent : P.border }} />)}</div>;
}
function StepLabel({ number, title, time }) {
  return (
    <div style={{ marginBottom: "20px" }}>

      <div style={{ maxWidth: "600px", margin: "0 auto", padding: "24px 20px" }}>
        <ProgressBar step={2} total={5} />
        <div style={{ maxWidth: "440px", margin: "20px auto 0" }}>
          <div style={{ background: P.warmLight, border: "1px solid " + P.red, borderRadius: "12px", padding: "24px", marginBottom: "24px", textAlign: "center" }}>
            <div style={{ fontSize: "40px", marginBottom: "12px" }}>⚖️</div>
            <div style={{ fontSize: "18px", fontWeight: 700, color: P.accentWarm, marginBottom: "8px", fontFamily: FONT }}>Free with your email:</div>
            <div style={{ fontSize: "14px", color: P.text, lineHeight: 1.7, fontFamily: FONT_SANS }}>
              Module 3: Rights & Strategy<br/>
              Tone-calibrated scripts for your meeting<br/>
              Your legal rights mapped to your situation<br/>
              <span style={{ fontSize: "12px", color: P.textLight, marginTop: "6px", display: "block" }}>+ Complete Meeting Packet after completing Module 3</span>
            </div>
          </div>
          <Card>
            <div style={{ fontSize: "15px", fontWeight: 700, color: P.text, marginBottom: "4px", fontFamily: FONT }}>Unlock Module 3: Rights & Strategy</div>
            <div style={{ fontSize: "13px", color: P.textMid, marginBottom: "20px", lineHeight: 1.5, fontFamily: FONT_SANS }}>Get instant access plus updates on new 504 tools and resources from Neurodivergent Uprising. No spam. Unsubscribe anytime.</div>
            <div style={{ marginBottom: "14px" }}>
              <label style={{ display: "block", fontSize: "13px", fontWeight: 600, color: P.text, marginBottom: "6px", fontFamily: FONT_SANS }}>First Name</label>
              <input type="text" value={emailGate.firstName} onChange={e => setEmailGate(g => ({...g, firstName: e.target.value}))} placeholder="Your first name" style={{ width: "100%", padding: "12px 14px", borderRadius: "8px", border: "1.5px solid "+P.border, background: P.bg, fontFamily: FONT_SANS, fontSize: "14px", color: P.text, boxSizing: "border-box" }} />
            </div>
            <div style={{ marginBottom: "20px" }}>
              <label style={{ display: "block", fontSize: "13px", fontWeight: 600, color: P.text, marginBottom: "6px", fontFamily: FONT_SANS }}>Email Address</label>
              <input type="email" value={emailGate.email} onChange={e => setEmailGate(g => ({...g, email: e.target.value, error: ""}))} placeholder="you@email.com" style={{ width: "100%", padding: "12px 14px", borderRadius: "8px", border: "1.5px solid "+(emailGate.error?P.red:P.border), background: P.bg, fontFamily: FONT_SANS, fontSize: "14px", color: P.text, boxSizing: "border-box" }} />
              {emailGate.error && <div style={{ color: P.red, fontSize: "12px", marginTop: "6px", fontFamily: FONT_SANS }}>{emailGate.error}</div>}
            </div>
            <button onClick={async () => {
              if (!emailGate.email || !emailGate.email.includes("@")) { setEmailGate(g => ({...g, error: "Please enter a valid email address."})); return; }
              setEmailGate(g => ({...g, submitting: true, error: ""}));
              try {
                const resp = await fetch("https://api.convertkit.com/v3/forms/9214289/subscribe", {
                  method: "POST", headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    api_key: "5IStEe1bSBePuVK8zOuOkw",
                    email: emailGate.email,
                    first_name: emailGate.firstName,
                    fields: {
                      source: "504-engine-freemium",
                      lane: "parent",
                      tool_used: "504_decision_engine",
                      child_grade: d1.grade || "",
                      meeting_type: d1.meetingType || "",
                      red_flags_count: r1 ? String(r1.redFlags.length) : "0",
                      top_disability: d1.disabilities[0] || ""
                    }
                  }),
                });
                const data = await resp.json();
                if (data.error) {
                  setEmailGate(g => ({...g, submitting: false, error: data.message || "Something went wrong. Please try again."}));
                } else {
                  setEmailGate(g => ({...g, submitting: false, done: true}));
                  go(3);
                }
              } catch (err) {
                setEmailGate(g => ({...g, submitting: false, error: "Connection error. Please try again."}));
              }
            }} disabled={emailGate.submitting}
            style={{ width: "100%", padding: "14px", borderRadius: "10px", border: "none", background: emailGate.submitting?P.border:P.accent, color: emailGate.submitting?P.textLight:"#fff", fontSize: "15px", fontWeight: 600, fontFamily: FONT, cursor: emailGate.submitting?"not-allowed":"pointer" }}>
              {emailGate.submitting ? "Unlocking..." : "Unlock Rights & Strategy — Free"}
            </button>
            <div style={{ fontSize: "11px", color: P.textLight, textAlign: "center", marginTop: "12px", lineHeight: 1.5, fontFamily: FONT_SANS }}>No spam. Your data stays with NDU. Unsubscribe anytime.</div>
          </Card>
          <div style={{ textAlign: "center", marginTop: "8px" }}>
            <button onClick={() => go(2)} style={{ background: "none", border: "none", color: P.textLight, fontSize: "13px", fontFamily: FONT_SANS, cursor: "pointer", textDecoration: "underline" }}>← Back to Accommodation Builder</button>
          </div>
        </div>
      </div>
    </div>
  );

  // ---- STEP 3: RIGHTS & STRATEGY ----
  if (step === 3) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <NavBar onGlossary={() => setGlossaryOpen(true)} />
      <div style={{ maxWidth: "600px", margin: "0 auto", padding: "24px 20px" }}>
        <ProgressBar step={3} total={5} />
        <StepLabel number={3} title="Rights & Strategy" time="2–3 min" />
        {r2 && (
          <Card style={{ borderColor: r2.overallRisk==="High"?P.red:r2.overallRisk==="Moderate"?P.orange:P.green }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
              <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.text, margin: 0 }}>Accommodation Stress-Test Results</h3>
              <SeverityBadge level={r2.overallRisk} />
            </div>
            {r2.gaps.length > 0 && (
              <div style={{ marginBottom: "12px" }}>
                <div style={{ fontSize: "12px", fontWeight: 600, fontFamily: FONT_SANS, color: P.red, marginBottom: "8px" }}>GAPS FOUND:</div>
                {r2.gaps.map((g,i) => (
                  <div key={i} style={{ padding: "10px", background: g.severity==="High"?P.redBg:P.orangeBg, borderRadius: "6px", marginBottom: "8px" }}>
                    <SeverityBadge level={g.severity} />
                    <div style={{ fontSize: "13px", fontFamily: FONT_SANS, color: P.text, lineHeight: 1.5, marginTop: "6px" }}>{g.text}</div>
                  </div>
                ))}
              </div>
            )}
            {r2.strengths.length > 0 && (
              <div>
                <div style={{ fontSize: "12px", fontWeight: 600, fontFamily: FONT_SANS, color: P.green, marginBottom: "8px" }}>STRENGTHS:</div>
                {r2.strengths.map((s,i) => <div key={i} style={{ padding: "8px 10px", background: P.greenBg, borderRadius: "6px", marginBottom: "6px", fontSize: "13px", fontFamily: FONT_SANS, color: P.green }}>✓ {s}</div>)}
              </div>
            )}
          </Card>
        )}
        <Card>
          <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.accent, margin: "0 0 4px" }}>What's in Dispute? *</h3>
          <p style={{ fontSize: "12px", color: P.textLight, fontFamily: FONT_SANS, margin: "0 0 12px" }}>Select the issues you need to address in this meeting. The engine will generate scripts and strategy for each one.</p>
          {DISPUTE_CATEGORIES_504.map(d => (
            <label key={d.id} style={{ display: "flex", alignItems: "flex-start", gap: "10px", marginBottom: "14px", cursor: "pointer", padding: "10px", borderRadius: "8px", background: d3.disputes.includes(d.id)?P.blueBg:"transparent", border: "1px solid "+(d3.disputes.includes(d.id)?P.blue:"transparent") }}>
              <input type="checkbox" checked={d3.disputes.includes(d.id)} onChange={() => toggleDispute(d.id)} style={{ marginTop: "2px" }} />
              <div>
                <div style={{ fontSize: "13px", fontWeight: 600, fontFamily: FONT_SANS, color: P.text, marginBottom: "2px" }}>{d.label}</div>
                <div style={{ fontSize: "12px", fontFamily: FONT_SANS, color: P.textLight, lineHeight: 1.4 }}>{d.leverage}</div>
              </div>
            </label>
          ))}
        </Card>
        <Card>
          <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.accent, margin: "0 0 8px" }}>Choose Your Tone</h3>
          {TONE_OPTIONS.map(t => (
            <button key={t.id} onClick={() => u3("tone",t.id)} style={{ display: "block", width: "100%", padding: "12px 14px", marginBottom: "8px", borderRadius: "8px", border: "1.5px solid "+(d3.tone===t.id?P.accent:P.border), background: d3.tone===t.id?P.accent+"0D":"#fff", cursor: "pointer", textAlign: "left" }}>
              <div style={{ fontSize: "13px", fontWeight: 600, fontFamily: FONT_SANS, color: d3.tone===t.id?P.accent:P.text }}>{t.label}</div>
              <div style={{ fontSize: "12px", fontFamily: FONT_SANS, color: P.textLight, marginTop: "2px" }}>{t.desc}</div>
            </button>
          ))}
        </Card>
        <div style={{ display: "flex", gap: "12px" }}>
          <button onClick={() => go(2)} style={{ flex: "0 0 auto", padding: "14px 20px", background: "#fff", border: "1px solid "+P.border, borderRadius: "10px", fontSize: "14px", fontFamily: FONT_SANS, cursor: "pointer", color: P.textMid }}>← Back</button>
          <button disabled={!can3} onClick={() => { const scripts = generateScripts(d1,r1,r2,d3.disputes,d3.tone); setR3(scripts); go(4); }} style={{ flex: 1, padding: "14px", background: can3?P.accent:P.border, color: can3?"#fff":P.textLight, border: "none", borderRadius: "10px", fontSize: "15px", fontWeight: 600, fontFamily: FONT, cursor: can3?"pointer":"not-allowed" }}>
            Generate Meeting Packet →
          </button>
        </div>
      </div>
    </div>
  );

  // ---- STEP 4: MEETING PACKET ----
  if (step === 4) return (
    <div style={{ minHeight: "100vh", background: P.bg, fontFamily: FONT }}>
      <GlossaryPanel open={glossaryOpen} onClose={() => setGlossaryOpen(false)} />
      <NavBar onGlossary={() => setGlossaryOpen(true)} />
      <div ref={printRef} style={{ maxWidth: "600px", margin: "0 auto", padding: "24px 20px" }}>
        <ProgressBar step={4} total={5} />
        <StepLabel number={4} title="Your Meeting Packet" />
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "16px" }} className="no-print">
          <button onClick={() => window.print()} style={{ background: P.gold, border: "none", color: "#fff", padding: "8px 18px", borderRadius: "6px", fontSize: "13px", fontWeight: 600, cursor: "pointer", fontFamily: FONT_SANS }}>🖨 Print Packet</button>
        </div>
        <InfoBox type="success">
          Your 504 meeting prep packet for <strong>{d1.childName}</strong> is ready. Review each section, then use the Print button to bring it to your meeting.
        </InfoBox>
        <Card>
          <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.accent, margin: "0 0 12px" }}>Meeting Overview</h3>
          <div style={{ fontSize: "13px", fontFamily: FONT_SANS, color: P.text, lineHeight: 1.8 }}>
            <strong>Student:</strong> {d1.childName} {d1.age && `(Age ${d1.age})`} {d1.grade && `— ${d1.grade} grade`}<br/>
            <strong>Meeting Type:</strong> {d1.meetingType || "504 Plan Meeting"}<br/>
            <strong>Disability:</strong> {d1.disabilities.join(", ")}<br/>
            <strong>Life Activities Impacted:</strong> {r1 && r1.rankedActivities.slice(0,4).map(a=>a.label).join(", ")}<br/>
            <strong>Accommodation Gaps:</strong> {r2 ? r2.gaps.length : 0} identified<br/>
            <strong>Red Flags:</strong> {r1 ? r1.redFlags.length : 0} detected<br/>
            <strong>Disputes:</strong> {d3.disputes.length} items<br/>
            <strong>Tone:</strong> {TONE_OPTIONS.find(t=>t.id===d3.tone)?.label || d3.tone}
          </div>
        </Card>
        {r1 && r1.redFlags.length > 0 && (
          <Card style={{ borderColor: P.red }}>
            <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.red, margin: "0 0 12px" }}>⚠ Red Flags to Address</h3>
            {r1.redFlags.map((rf,i) => (
              <div key={i} style={{ padding: "10px", background: P.redBg, borderRadius: "6px", marginBottom: "8px", fontSize: "13px", fontFamily: FONT_SANS, color: P.text, lineHeight: 1.5 }}>
                <SeverityBadge level={rf.severity} /> <span style={{ marginLeft: "8px" }}>{rf.text}</span>
              </div>
            ))}
          </Card>
        )}
        {r2 && r2.gaps.length > 0 && (
          <Card>
            <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.orange, margin: "0 0 12px" }}>Accommodation Gaps</h3>
            {r2.gaps.map((g,i) => (
              <div key={i} style={{ padding: "10px", background: g.severity==="High"?P.redBg:P.orangeBg, borderRadius: "6px", marginBottom: "8px", fontSize: "13px", fontFamily: FONT_SANS, color: P.text, lineHeight: 1.5 }}>
                <SeverityBadge level={g.severity} /> <span style={{ marginLeft: "8px" }}>{g.text}</span>
              </div>
            ))}
          </Card>
        )}
        <Card>
          <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.accent, margin: "0 0 12px" }}>Accommodation Checklist</h3>
          <p style={{ fontSize: "12px", color: P.textLight, fontFamily: FONT_SANS, margin: "0 0 12px" }}>These are the accommodations you selected. Bring this list to your meeting to ensure each one is addressed.</p>
          {d2.selectedAccommodations.map((acc,i) => (
            <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: "8px", marginBottom: "8px" }}>
              <span style={{ fontSize: "14px", lineHeight: 1.4 }}>☐</span>
              <span style={{ fontSize: "13px", fontFamily: FONT_SANS, color: P.text, lineHeight: 1.4 }}>{acc}</span>
            </div>
          ))}
        </Card>
        {r3 && r3.map((script,i) => (
          <Card key={i}>
            <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.accent, margin: "0 0 8px" }}>{script.label}</h3>
            <div style={{ fontSize: "13px", fontFamily: FONT_SANS, color: P.text, lineHeight: 1.7, whiteSpace: "pre-wrap", background: P.blueBg, padding: "14px", borderRadius: "8px" }}>{script.text}</div>
          </Card>
        ))}
        <Card>
          <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.accent, margin: "0 0 8px" }}>Your Documented Concerns</h3>
          <div style={{ fontSize: "13px", fontFamily: FONT_SANS, color: P.text, lineHeight: 1.7 }}>
            <strong>Primary:</strong> {d1.concern1}<br/>
            {d1.concern2 && <span><strong>Additional:</strong> {d1.concern2}<br/></span>}
          </div>
        </Card>
        <Card>
          <h3 style={{ fontSize: "14px", fontFamily: FONT_SANS, color: P.accent, margin: "0 0 8px" }}>Decision Log (use during the meeting)</h3>
          <p style={{ fontSize: "12px", color: P.textLight, fontFamily: FONT_SANS, margin: "0 0 12px" }}>Write down each decision made during the meeting. Ask to have decisions read back before the meeting ends.</p>
          {[1,2,3,4,5].map(n => <div key={n} style={{ borderBottom: "1px solid "+P.border, padding: "12px 0", fontSize: "13px", fontFamily: FONT_SANS, color: P.textLight }}>Decision {n}: _______________________________________________</div>)}
        </Card>
        <div style={{ textAlign: "center", padding: "24px 0" }} className="no-print">
          <button onClick={() => window.print()} style={{ padding: "14px 32px", background: P.gold, color: "#fff", border: "none", borderRadius: "10px", fontSize: "15px", fontWeight: 600, fontFamily: FONT, cursor: "pointer" }}>🖨 Print This Packet</button>
          <div style={{ fontSize: "12px", color: P.textLight, fontFamily: FONT_SANS, marginTop: "8px" }}>Print or save as PDF before your meeting</div>
        </div>
        <Card style={{ background: P.accent, border: "none" }}>
          <h3 style={{ fontSize: "16px", fontFamily: FONT, color: "#fff", margin: "0 0 8px" }}>Need more support?</h3>
          <p style={{ fontSize: "13px", fontFamily: FONT_SANS, color: "rgba(255,255,255,0.7)", margin: "0 0 12px", lineHeight: 1.5 }}>Neurodivergent Uprising offers 1:1 advocacy support for parents navigating 504 plans and IEPs. If you need someone in your corner, we're here.</p>
          <a href="https://neurodivergentuprising.com" target="_blank" rel="noopener noreferrer" style={{ display: "inline-block", padding: "10px 20px", background: P.gold, color: "#fff", borderRadius: "8px", fontSize: "13px", fontWeight: 600, fontFamily: FONT_SANS, textDecoration: "none" }}>Learn More →</a>
        </Card>
        <div style={{ marginTop: "24px", padding: "16px", textAlign: "center", fontSize: "11px", color: P.textLight, fontFamily: FONT_SANS, lineHeight: 1.5 }}>
          © 2026 Neurodivergent Uprising. This tool provides educational guidance based on Section 504 of the Rehabilitation Act. Not legal advice.
        </div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
